<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Minhas Transações</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #24cac0;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .saldo {
            text-align: right;
            font-size: 1.5em;
            font-weight: bold;
            color: #0b0b0b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        table th {
            background-color: #f5f5f5;
        }
        .descricao {
            width: 60%;
        }
        .valor {
            text-align: right;
        }
        .btn {
            padding: 5px 10px;
            margin: 0 5px;
            cursor: pointer;
            background-color: #24cac0;
            color: #0b0b0b;
            border: none;
            border-radius: 5px;
        }
        .btn-editar {
            background-color: #888;
        }
        .btn-deletar {
            background-color: #e74c3c;
        }
        .logout {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #ff6f61;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            padding-top: 60px;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
        }
        .modal-content label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .modal-content input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .modal-content button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            background-color: #24cac0;
            color: #0b0b0b;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Minhas Transações</h1>
    <p class="saldo"><strong>Saldo Atual:</strong> R$ <span id="usuarioSaldo"></span></p>

    <button class="btn" onclick="abrirModal('adicionar')">Adicionar Movimentação</button>

    <table>
        <thead>
        <tr>
            <th class="descricao">Descrição</th>
            <th class="valor">Valor</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody id="tabelaTransacoes">
        <!-- As transações serão inseridas aqui via JavaScript -->
        </tbody>
    </table>

    <span class="logout" onclick="logout()">Sair</span>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h2 id="modalTitulo">Adicionar Movimentação</h2>
        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" placeholder="Descrição da movimentação">
        <label for="valor">Valor:</label>
        <input type="number" id="valor" placeholder="Valor da movimentação">
        <button class="btn" onclick="salvarMovimentacao()">Salvar</button>
    </div>
</div>

<script>
    let usuario = {
        nome: "João Silva",
        saldo: 5000.00,
        movimentacoes: [
            { descricao: "Depósito", valor: 1500.00 },
            { descricao: "Saque", valor: -200.00 },
            { descricao: "Transferência", valor: -500.00 }
        ]
    };
    let modoEdicao = false;
    let indexEdicao = -1;

    function carregarDashboard() {
        document.getElementById("usuarioSaldo").textContent = usuario.saldo.toFixed(2);

        const tabela = document.getElementById("tabelaTransacoes");
        tabela.innerHTML = "";

        usuario.movimentacoes.forEach(function(movimentacao, index) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${movimentacao.descricao}</td>
                <td>${movimentacao.valor.toFixed(2)}</td>
                <td>
                    <button class="btn btn-editar" onclick="abrirModal('editar', ${index})">Editar</button>
                    <button class="btn btn-deletar" onclick="deletarMovimentacao(${index})">Deletar</button>
                </td>
            `;
            tabela.appendChild(tr);
        });
    }

    function abrirModal(acao, index = -1) {
        modoEdicao = acao === 'editar';
        indexEdicao = index;

        const modal = document.getElementById("modal");
        const modalTitulo = document.getElementById("modalTitulo");
        const descricaoInput = document.getElementById("descricao");
        const valorInput = document.getElementById("valor");

        if (modoEdicao) {
            modalTitulo.textContent = "Editar Movimentação";
            const movimentacao = usuario.movimentacoes[index];
            descricaoInput.value = movimentacao.descricao;
            valorInput.value = movimentacao.valor;
        } else {
            modalTitulo.textContent = "Adicionar Movimentação";
            descricaoInput.value = "";
            valorInput.value = "";
        }

        modal.style.display = "block";
    }

    function fecharModal() {
        const modal = document.getElementById("modal");
        modal.style.display = "none";
    }

    function salvarMovimentacao() {
        const descricao = document.getElementById("descricao").value;
        const valor = parseFloat(document.getElementById("valor").value);

        if (modoEdicao) {
            usuario.movimentacoes[indexEdicao].descricao = descricao;
            usuario.movimentacoes[indexEdicao].valor = valor;
        } else {
            usuario.movimentacoes.push({ descricao: descricao, valor: valor });
        }

        usuario.saldo += valor;
        carregarDashboard();
        fecharModal();
    }

    function deletarMovimentacao(index) {
        const valor = usuario.movimentacoes[index].valor;
        usuario.movimentacoes.splice(index, 1);
        usuario.saldo -= valor;
        carregarDashboard();
    }

    carregarDashboard();
</script>
</body>
</html>
